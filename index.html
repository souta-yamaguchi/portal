<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Souta Yamaguchi — Works</title>
<link rel="stylesheet" href="static/style.css">
<link rel="stylesheet" href="static/chat.css">
</head>
<body>

<div class="bg-aurora" aria-hidden="true">
  <span class="bg-orb bg-orb-1"></span>
  <span class="bg-orb bg-orb-2"></span>
  <span class="bg-orb bg-orb-3"></span>
  <span class="bg-orb bg-orb-4"></span>
  <span class="bg-orb bg-orb-5"></span>
</div>

<header class="site-header">
  <div class="site-header-inner">
    <a href="https://oyoyo.co.jp/" class="site-logo">
      <img src="static/img/oyoyo-logo.png" alt="オヨヨ株式会社">
    </a>
    <button class="hamburger" id="hamburger-btn" aria-label="メニューを開く" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" id="site-nav">
      <ul>
        <li><a href="https://oyoyo.co.jp/">ホーム</a></li>
        <li><a href="/" class="active">AIX推進室</a></li>
        <li><a href="https://oyoyo.co.jp/product/">製品紹介</a></li>
        <li><a href="https://oyoyo.co.jp/case/">事例</a></li>
        <li><a href="https://oyoyo.co.jp/price/">料金</a></li>
        <li><a href="https://oyoyo.co.jp/companyinfo/">会社情報</a></li>
        <li><a href="https://oyoyo.co.jp/privacy/">プライバシーポリシー</a></li>
        <li class="contact-item"><a href="https://oyoyo.co.jp/inquiry/" class="contact-btn">お問い合わせ</a></li>
      </ul>
    </nav>
  </div>
</header>

<script>
  (function(){
    var btn = document.getElementById('hamburger-btn');
    var nav = document.getElementById('site-nav');
    if (!btn || !nav) return;
    btn.addEventListener('click', function(){
      var opened = nav.classList.toggle('is-open');
      btn.classList.toggle('is-open', opened);
      btn.setAttribute('aria-expanded', opened ? 'true' : 'false');
      btn.setAttribute('aria-label', opened ? 'メニューを閉じる' : 'メニューを開く');
    });
    // メニュー内リンククリックで自動閉じる
    nav.addEventListener('click', function(e){
      if (e.target.tagName === 'A') {
        nav.classList.remove('is-open');
        btn.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  })();
</script>

<div class="container">

  <header class="hero">
    <div class="hero-bg-text" aria-hidden="true">OYOYO</div>
    <div class="hero-content">
      <h1 id="owner-name">…</h1>
      <p id="owner-subtitle" class="subtitle">…</p>
      <p id="owner-intro" class="intro">…</p>
    </div>
    <div class="hero-scroll" aria-hidden="true">↓&nbsp;&nbsp;SCROLL</div>
  </header>

  <main id="sections-container">
    <p class="loading">読み込み中…</p>
  </main>

  <footer>
    <p>© <span id="year">2026</span> Souta Yamaguchi</p>
  </footer>

</div>

<!-- AI チャット UI -->
<button class="chat-fab" id="chat-fab" aria-label="AIに話しかける">
  <span class="ai-speech" id="ai-speech">何か聞きたいことある？</span>
  <svg class="ai-character" viewBox="0 0 180 240" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="aiBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6e7cff"/>
        <stop offset="100%" stop-color="#b48cff"/>
      </linearGradient>
      <radialGradient id="aiGlow">
        <stop offset="0%" stop-color="#b48cff" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#b48cff" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- 後光 -->
    <circle class="ai-glow" cx="90" cy="110" r="92" fill="url(#aiGlow)"/>

    <!-- アンテナ -->
    <line x1="90" y1="38" x2="90" y2="22" stroke="rgba(180, 140, 255, 0.85)" stroke-width="2.5" stroke-linecap="round"/>
    <circle class="ai-antenna-tip" cx="90" cy="18" r="5" fill="#b48cff"/>

    <!-- 頭 -->
    <ellipse cx="90" cy="70" rx="38" ry="42" fill="url(#aiBodyGrad)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>

    <!-- 目（左右） -->
    <g class="ai-eye" transform="translate(76, 66)">
      <circle r="6" fill="#fff"/>
      <circle r="3" fill="#2a2a3e" cx="1" cy="0"/>
    </g>
    <g class="ai-eye" transform="translate(104, 66)">
      <circle r="6" fill="#fff"/>
      <circle r="3" fill="#2a2a3e" cx="1" cy="0"/>
    </g>

    <!-- 口 -->
    <path d="M 78 90 Q 90 98 102 90" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- 体 -->
    <rect x="58" y="118" width="64" height="80" rx="22" fill="url(#aiBodyGrad)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>

    <!-- チェスト灯 -->
    <circle class="ai-chest-light" cx="90" cy="158" r="9" fill="#5fd97b"/>
    <circle cx="90" cy="158" r="4" fill="#fff" opacity="0.85"/>

    <!-- 左腕（静止、体の左） -->
    <g>
      <rect x="38" y="125" width="18" height="55" rx="9" fill="url(#aiBodyGrad)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <circle cx="47" cy="185" r="10" fill="url(#aiBodyGrad)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    </g>

    <!-- 右腕（手振り、上向き、肩=下端を中心に振る） -->
    <g class="ai-arm-waving">
      <rect x="122" y="60" width="18" height="60" rx="9" fill="url(#aiBodyGrad)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <circle cx="131" cy="52" r="12" fill="url(#aiBodyGrad)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    </g>
  </svg>
</button>

<aside class="chat-panel" id="chat-panel" aria-label="AIチャット">
  <div class="chat-header">
    <div class="chat-title">
      <span class="chat-title-dot"></span>
      <span>AI に話しかける</span>
    </div>
    <button class="chat-close" id="chat-close" aria-label="閉じる">×</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <form class="chat-form" id="chat-form">
    <textarea
      class="chat-input"
      id="chat-input"
      placeholder="メッセージを入力（Enter で送信）"
      rows="1"
      maxlength="1000"
    ></textarea>
    <button type="submit" class="chat-send" id="chat-send">送信</button>
  </form>
  <div class="chat-disclaimer">
    Groq Llama 3.3 / 入力内容は Groq に送信されます
  </div>
</aside>

<script src="static/script.js"></script>
<script src="static/chat.js"></script>
</body>
</html>
