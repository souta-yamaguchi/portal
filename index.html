<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Souta Yamaguchi — Works</title>
<link rel="stylesheet" href="static/style.css">
<link rel="stylesheet" href="static/chat.css">
</head>
<body>

<div class="bg-aurora" aria-hidden="true">
  <span class="bg-orb bg-orb-1"></span>
  <span class="bg-orb bg-orb-2"></span>
  <span class="bg-orb bg-orb-3"></span>
  <span class="bg-orb bg-orb-4"></span>
  <span class="bg-orb bg-orb-5"></span>
</div>

<header class="site-header">
  <div class="site-header-inner">
    <a href="https://oyoyo.co.jp/" class="site-logo">
      <img src="static/img/oyoyo-logo.png" alt="オヨヨ株式会社">
    </a>
    <button class="hamburger" id="hamburger-btn" aria-label="メニューを開く" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" id="site-nav">
      <ul>
        <li><a href="https://oyoyo.co.jp/">ホーム</a></li>
        <li><a href="/" class="active">AIX推進室</a></li>
        <li><a href="https://oyoyo.co.jp/product/">製品紹介</a></li>
        <li><a href="https://oyoyo.co.jp/case/">事例</a></li>
        <li><a href="https://oyoyo.co.jp/price/">料金</a></li>
        <li><a href="https://oyoyo.co.jp/companyinfo/">会社情報</a></li>
        <li><a href="https://oyoyo.co.jp/privacy/">プライバシーポリシー</a></li>
        <li class="contact-item"><a href="https://oyoyo.co.jp/inquiry/" class="contact-btn">お問い合わせ</a></li>
      </ul>
    </nav>
  </div>
</header>

<script>
  (function(){
    var btn = document.getElementById('hamburger-btn');
    var nav = document.getElementById('site-nav');
    if (!btn || !nav) return;
    btn.addEventListener('click', function(){
      var opened = nav.classList.toggle('is-open');
      btn.classList.toggle('is-open', opened);
      btn.setAttribute('aria-expanded', opened ? 'true' : 'false');
      btn.setAttribute('aria-label', opened ? 'メニューを閉じる' : 'メニューを開く');
    });
    // メニュー内リンククリックで自動閉じる
    nav.addEventListener('click', function(e){
      if (e.target.tagName === 'A') {
        nav.classList.remove('is-open');
        btn.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  })();
</script>

<div class="container">

  <header class="hero">
    <div class="hero-bg-text" aria-hidden="true">OYOYO</div>
    <div class="hero-content">
      <h1 id="owner-name">…</h1>
      <p id="owner-subtitle" class="subtitle">…</p>
      <p id="owner-intro" class="intro">…</p>
    </div>
    <div class="hero-scroll" aria-hidden="true">↓&nbsp;&nbsp;SCROLL</div>
  </header>

  <main id="sections-container">
    <p class="loading">読み込み中…</p>
  </main>

  <footer>
    <p>© <span id="year">2026</span> Souta Yamaguchi</p>
  </footer>

</div>

<!-- AI チャット UI -->
<button class="chat-fab" id="chat-fab" aria-label="AIに話しかける">
  <span>✨</span>
  <span class="chat-fab-label">AIに話しかける</span>
</button>

<aside class="chat-panel" id="chat-panel" aria-label="AIチャット">
  <div class="chat-header">
    <div class="chat-title">
      <span class="chat-title-dot"></span>
      <span>AI に話しかける</span>
    </div>
    <button class="chat-close" id="chat-close" aria-label="閉じる">×</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <form class="chat-form" id="chat-form">
    <textarea
      class="chat-input"
      id="chat-input"
      placeholder="メッセージを入力（Enter で送信）"
      rows="1"
      maxlength="1000"
    ></textarea>
    <button type="submit" class="chat-send" id="chat-send">送信</button>
  </form>
  <div class="chat-disclaimer">
    Groq Llama 3.3 / 入力内容は Groq に送信されます
  </div>
</aside>

<script src="static/script.js"></script>
<script src="static/chat.js"></script>
</body>
</html>
